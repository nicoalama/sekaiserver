name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build
        run: |
          ext=""
          [ "${{ matrix.os }}" = "windows" ] && ext=".exe"
          output="sekai-server-${{ matrix.os }}-${{ matrix.arch }}${ext}"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w" -o "$output" .

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sekai-server-${{ matrix.os }}-${{ matrix.arch }}
          path: sekai-server-${{ matrix.os }}-${{ matrix.arch }}*

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: sekai-server-*
          merge-multiple: true

      - name: Checksums
        run: sha256sum sekai-server-* > checksums.txt

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            sekai-server-linux-amd64
            sekai-server-linux-arm64
            sekai-server-darwin-amd64
            sekai-server-darwin-arm64
            sekai-server-windows-amd64.exe
            checksums.txt
          generate_release_notes: true
